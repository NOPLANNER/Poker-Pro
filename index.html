<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokerIndex-Pro</title>
    <style>
        :root {
            --bg: #050505; --accent: #d4af37;
            --spades: #4d94ff; --clubs: #5cd65c; --hearts: #ff4d4d; --diamonds: #ffcc00;
        }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* 上部エリア */
        .header {
            height: 40px; background: #000; display: flex; align-items: center;
            padding: 0 10px; border-bottom: 1px solid #333; justify-content: space-between;
            flex-shrink: 0;
        }
        .stat-box { font-size: 0.65rem; color: var(--accent); font-weight: bold; }
        .title-logo { font-size: 0.8rem; font-weight: bold; color: #fff; letter-spacing: 1px; }

        /* 中部エリア（テーブルとプレイヤー） */
        .main-view { 
            flex-grow: 1; position: relative; 
            overflow: hidden; 
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        }
        
        .poker-table {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 88%; height: 65%; border: 3px solid #2a2a2a; border-radius: 180px; background: #080808;
        }

        .board-container { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            display: flex; gap: 4px; z-index: 5; 
        }

        .player { position: absolute; width: 62px; text-align: center; z-index: 10; transform: translate(-50%, -50%); }
        .player-box { background: rgba(0,0,0,0.9); border: 1px solid #444; border-radius: 4px; padding: 2px; font-size: 0.55rem; }
        .btn-marker { position: absolute; top: -6px; right: -6px; background: #fff; color: #000; border-radius: 50%; width: 14px; height: 14px; font-weight: bold; line-height: 14px; text-align: center; border: 1px solid #000; font-size: 0.55rem; }
        .stack-in { width: 100%; background: transparent; border: none; color: #fff; text-align: center; border-bottom: 1px solid #333; font-size: 0.6rem; outline: none; }
        .pos-label { color: var(--accent); font-weight: bold; font-size: 0.55rem; }

        /* カード枠 */
        .slot {
            width: 32px; height: 45px; background: #111; border: 1px dashed #444; border-radius: 3px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; font-size: 0.75rem;
        }
        .c-spades { color: var(--spades); background: #fff; border-style: solid; }
        .c-clubs { color: var(--clubs); background: #fff; border-style: solid; }
        .c-hearts { color: var(--hearts); background: #fff; border-style: solid; }
        .c-diamonds { color: var(--diamonds); background: #fff; border-style: solid; }

        /* 下部エリア */
        .footer-btns { 
            height: 50px; background: #000; border-top: 1px solid #333;
            display: flex; justify-content: center; align-items: center; gap: 15px;
            flex-shrink: 0;
        }
        .f-btn { background: #222; color: #fff; border: 1px solid #444; padding: 8px 16px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; }

        /* モーダル類 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #444; width: 92%; max-width: 600px; }
        .deck-grid { display: flex; flex-direction: column; gap: 3px; }
        .suit-row { display: grid; grid-template-columns: repeat(13, 1fr); gap: 2px; }
        .p-btn { aspect-ratio: 2/3; background: #eee; border-radius: 2px; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: bold; }
        .p-btn.disabled { background: #2a2a2a !important; color: #444 !important; pointer-events: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="stat-box">EQ: <span id="equity-val">--%</span> | <span id="gto-text">GTO: ---</span></div>
    <div class="title-logo">PokerIndex-Pro</div>
    <button onclick="openModal('settings-modal')" style="background:#333; color:var(--accent); border:1px solid var(--accent); padding:4px 8px; border-radius:4px; font-weight:bold; font-size:0.65rem;">Settings</button>
</div>

<div class="main-view">
    <div class="poker-table"></div>
    <div class="board-container">
        <div class="slot" id="b1" onclick="openPicker('b1')">?</div>
        <div class="slot" id="b2" onclick="openPicker('b2')">?</div>
        <div class="slot" id="b3" onclick="openPicker('b3')">?</div>
        <div class="slot" id="b4" onclick="openPicker('b4')">?</div>
        <div class="slot" id="b5" onclick="openPicker('b5')">?</div>
    </div>
    <div id="player-container"></div>
</div>

<div class="footer-btns">
    <button class="f-btn" onclick="nextHand()" style="background:var(--accent); color:#000; border:none;">Next Hand</button>
    <button class="f-btn" onclick="resetCards()">Clear</button>
    <div id="rate-display" style="font-size:0.6rem; color:#888;">$1/2</div>
</div>

<div id="settings-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin:0 0 10px 0; font-size:1rem;">Game Settings</h3>
        <p style="font-size:0.8rem;">Players: <input type="range" id="set-players" min="2" max="9" value="6" oninput="pVal.innerText=this.value"> <span id="pVal">6</span></p>
        <p style="font-size:0.8rem;">SB <input type="number" id="set-sb" value="1" style="width:40px;"> / BB <input type="number" id="set-bb" value="2" style="width:40px;"></p>
        <p style="font-size:0.8rem;">
            <label><input type="checkbox" id="set-ante"> Ante</label> &nbsp;
            <label><input type="checkbox" id="set-straddle"> Straddle</label>
        </p>
        <button onclick="applySettings()" style="width:100%; padding:10px; background:var(--accent); border:none; border-radius:5px; font-weight:bold;">Apply Changes</button>
    </div>
</div>

<div id="picker-modal" class="modal">
    <div class="modal-content">
        <div class="deck-grid" id="deck-container"></div>
        <button onclick="closeModal('picker-modal')" style="width:100%; padding:10px; margin-top:10px; background:#333; color:#fff; border:none; border-radius:5px;">Cancel</button>
    </div>
</div>

<script>
    let activeSlotId = null;
    let usedCards = {};
    let playerCount = 6;
    let btnPosition = 0;
    const suits_data = [{id:'spades', char:'♠', color:'var(--spades)'}, {id:'clubs', char:'♣', color:'var(--clubs)'}, {id:'hearts', char:'♥', color:'var(--hearts)'}, {id:'diamonds', char:'♦', color:'var(--diamonds)'}];
    const ranks = ['A','K','Q','J','10','9','8','7','6','5','4','3','2'];

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function openPicker(id) {
        activeSlotId = id;
        const container = document.getElementById('deck-container');
        container.innerHTML = '';
        suits_data.forEach(suit => {
            const row = document.createElement('div'); row.className = 'suit-row';
            ranks.forEach(rank => {
                const key = `${suit.id}-${rank}`;
                const btn = document.createElement('button'); btn.className = 'p-btn';
                btn.style.color = suit.color;
                if(Object.values(usedCards).includes(key) && usedCards[activeSlotId] !== key) btn.classList.add('disabled');
                btn.innerHTML = `<div>${rank}</div><div>${suit.char}</div>`;
                btn.onclick = () => {
                    const slot = document.getElementById(activeSlotId);
                    slot.className = `slot c-${suit.id}`;
                    slot.innerHTML = `<div>${rank}</div><div>${suit.char}</div>`;
                    usedCards[activeSlotId] = key;
                    closeModal('picker-modal');
                    calcLogic();
                };
                row.appendChild(btn);
            });
            container.appendChild(row);
        });
        openModal('picker-modal');
    }

    function applySettings() {
        playerCount = parseInt(document.getElementById('set-players').value);
        const ante = document.getElementById('set-ante').checked ? ' (Ante)' : '';
        const str = document.getElementById('set-straddle').checked ? ' (Str)' : '';
        document.getElementById('rate-display').innerText = `$${document.getElementById('set-sb').value}/${document.getElementById('set-bb').value}${ante}${str}`;
        renderPlayers();
        closeModal('settings-modal');
    }

    function renderPlayers() {
        const container = document.getElementById('player-container');
        container.innerHTML = '';
        for(let i=0; i<playerCount; i++) {
            const p = document.createElement('div'); p.className = 'player';
            const angle = (i * (360 / playerCount)) + 90;
            const rx = 42, ry = 40; 
            p.style.left = (50 + rx * Math.cos(angle * Math.PI / 180)) + '%';
            p.style.top = (50 + ry * Math.sin(angle * Math.PI / 180)) + '%';

            const currentPosIdx = (i - btnPosition + playerCount) % playerCount;
            const isBTN = (currentPosIdx === 0);
            const isHero = (i === 0);
            const posName = getPosName(currentPosIdx, playerCount);

            let inner = `<div class="player-box">
                ${isBTN ? '<div class="btn-marker">D</div>' : ''}
                <div class="pos-label">${isHero ? 'HERO ('+posName+')' : posName}</div>
                <input class="stack-in" value="100BB">`;
            if(isHero) {
                inner += `<div style="display:flex; gap:3px; margin-top:2px; justify-content:center;">
                    <div class="slot" id="h1" onclick="openPicker('h1')">${getVal('h1')}</div>
                    <div class="slot" id="h2" onclick="openPicker('h2')">${getVal('h2')}</div>
                </div>`;
            }
            inner += `</div>`;
            p.innerHTML = inner;
            container.appendChild(p);
            if(isHero) restoreHeroStyle();
        }
    }

    function getPosName(idx, total) {
        if (idx === 0) return "BTN"; if (idx === 1) return "SB"; if (idx === 2) return "BB";
        const rem = total - idx;
        if (rem === 1) return "CO"; if (rem === 2) return "HJ";
        return "UTG" + (idx > 3 ? "+" + (idx-3) : "");
    }

    function getVal(id) {
        if(usedCards[id]) {
            const [s, r] = usedCards[id].split('-');
            const suit = suits_data.find(x=>x.id===s);
            return `<div>${r}</div><div>${suit.char}</div>`;
        }
        return '?';
    }

    function restoreHeroStyle() {
        ['h1','h2'].forEach(id => {
            if(usedCards[id]) {
                const parts = usedCards[id].split('-');
                const el = document.getElementById(id);
                el.className = `slot c-${parts[0]}`;
                const suit = suits_data.find(x=>x.id===parts[0]);
                el.innerHTML = `<div>${parts[1]}</div><div>${suit.char}</div>`;
            }
        });
    }

    function nextHand() { btnPosition = (btnPosition + 1) % playerCount; resetCards(); renderPlayers(); }
    function resetCards() {
        usedCards = {};
        document.querySelectorAll('.slot').forEach(s => { s.className = 'slot'; s.innerHTML = '?'; });
        document.getElementById('equity-val').innerText = "--%";
        document.getElementById('gto-text').innerText = "GTO: ---";
        renderPlayers();
    }

    function calcLogic() {
        if(usedCards['h1'] && usedCards['h2']) {
            const eq = Math.floor(Math.random() * 40 + 35);
            document.getElementById('equity-val').innerText = eq + "%";
            document.getElementById('gto-text').innerText = "GTO: " + (eq > 60 ? "RAISE" : eq > 45 ? "CALL" : "FOLD");
        }
    }

    applySettings();
</script>
</body>
</html>
