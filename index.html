<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poker Strategy - 52 Deck</title>
    <style>
        :root {
            --bg-dark: #050505;
            --table-gray: #1a1a1a;
            --accent-gold: #d4af37;
            --color-spades: #4d94ff;
            --color-hearts: #ff4d4d;
            --color-clubs: #5cd65c;
            --color-diamonds: #ffcc00;
        }

        html, body { margin: 0; padding: 0; background: #000; width: 100%; height: 100%; overflow: hidden; }

        /* 90度回転レイアウト：物理的な向きに合わせる */
        .rotated-wrapper {
            position: absolute; top: 50%; left: 50%;
            width: 100vh; height: 100vw;
            transform: translate(-50%, -50%) rotate(90deg);
            background: var(--bg-dark); display: flex; flex-direction: column;
            transform-origin: center center;
        }

        .table-area {
            flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center;
        }

        .poker-table {
            width: 88%; height: 62%; background: var(--table-gray);
            border: 8px solid #2a2a2a; border-radius: 150px; position: relative;
            box-shadow: inset 0 0 50px #000;
        }

        /* カードスロット */
        .card {
            width: 48px; height: 68px; background: #111; border-radius: 6px;
            color: #444; display: flex; flex-direction: column; align-items: center;
            justify-content: center; font-weight: bold; cursor: pointer; border: 2px dashed #333;
            font-size: 1rem; transition: all 0.2s;
        }
        .card.selected { background: #fff; color: #000; border: 1px solid #ccc; border-style: solid; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }

        /* ピッカー */
        .modal { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.92); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; width: 90%; text-align: center; }
        
        .picker-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 15px; }
        .suit-btn { font-size: 28px; padding: 12px; cursor: pointer; border: 1px solid #333; background: #222; border-radius: 8px; flex: 1; }
        .rank-btn { padding: 12px 0; background: #fff; color: #000; border-radius: 5px; font-weight: bold; font-size: 1rem; }
        
        /* 使用済みカードの暗転 */
        .rank-btn.disabled { background: #2a2a2a !important; color: #444 !important; cursor: not-allowed; pointer-events: none; }

        /* スート別色設定 */
        .spades { color: var(--color-spades); }
        .hearts { color: var(--color-hearts); }
        .clubs { color: var(--color-clubs); }
        .diamonds { color: var(--color-diamonds); }
    </style>
</head>
<body>

<div class="rotated-wrapper">
    <nav style="height:45px; background:#111; display:flex; align-items:center; padding:0 20px; justify-content:space-between; border-bottom:1px solid #222;">
        <div style="color:var(--accent-gold); font-weight:bold; font-size:0.9rem;">Poker Logic Pro</div>
        <button onclick="resetAll()" style="background:#cc0000; color:white; border:none; padding:5px 12px; border-radius:4px; font-size:0.8rem; font-weight:bold;">RESET</button>
    </nav>

    <div class="table-area">
        <div class="poker-table">
            <!-- Board (5枚) -->
            <div style="position:absolute; top:42%; left:50%; transform:translate(-50%, -50%); display:flex; gap:10px;">
                <div class="card" id="b1" onclick="openPicker('b1')">?</div>
                <div class="card" id="b2" onclick="openPicker('b2')">?</div>
                <div class="card" id="b3" onclick="openPicker('b3')">?</div>
                <div class="card" id="b4" onclick="openPicker('b4')">?</div>
                <div class="card" id="b5" onclick="openPicker('b5')">?</div>
            </div>

            <!-- Hero Hand (2枚) -->
            <div style="position:absolute; bottom:-45px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center;">
                <div style="display:flex; gap:10px; margin-bottom:8px;">
                    <div class="card" id="h1" onclick="openPicker('h1')" style="width:60px; height:85px; font-size:1.2rem;">?</div>
                    <div class="card" id="h2" onclick="openPicker('h2')" style="width:60px; height:85px; font-size:1.2rem;">?</div>
                </div>
                <div style="color:var(--accent-gold); font-size:0.75rem; font-weight:bold; letter-spacing:1px;">MY HAND</div>
            </div>
        </div>
    </div>

    <!-- カードピッカーモーダル -->
    <div id="card-picker" class="modal">
        <div class="modal-content">
            <h3 id="picker-title" style="margin:0 0 15px 0; color:#888; font-size:1rem;">Select Suit</h3>
            <div id="suit-selection" style="display:flex; justify-content:space-between; gap:10px;">
                <div class="suit-btn spades" onclick="selectSuit('spades', '♠')">♠</div>
                <div class="suit-btn hearts" onclick="selectSuit('hearts', '♥')">♥</div>
                <div class="suit-btn clubs" onclick="selectSuit('clubs', '♣')">♣</div>
                <div class="suit-btn diamonds" onclick="selectSuit('diamonds', '♦')">♦</div>
            </div>
            <div id="rank-selection" class="picker-grid" style="display:none;"></div>
            <button onclick="document.getElementById('card-picker').style.display='none'" style="margin-top:20px; width:100%; padding:12px; background:#333; color:#aaa; border:none; border-radius:6px;">Cancel</button>
        </div>
    </div>
</div>

<script>
    let activeId = null;
    let selSuit = '';
    let selChar = '';
    // 使用中カードの追跡用オブジェクト { スロットID: "マーク-数字" }
    let usedCards = {};

    function openPicker(id) {
        activeId = id;
        document.getElementById('suit-selection').style.display = 'flex';
        document.getElementById('rank-selection').style.display = 'none';
        document.getElementById('card-picker').style.display = 'flex';
        document.getElementById('picker-title').innerText = "Select Suit";
    }

    function selectSuit(suit, char) {
        selSuit = suit;
        selChar = char;
        document.getElementById('suit-selection').style.display = 'none';
        const grid = document.getElementById('rank-selection');
        grid.style.display = 'grid';
        grid.innerHTML = '';
        document.getElementById('picker-title').innerText = `Select Rank (${char})`;

        const ranks = ['A','K','Q','J','10','9','8','7','6','5','4','3','2'];
        ranks.forEach(rank => {
            const btn = document.createElement('div');
            btn.className = 'rank-btn';
            const cardKey = `${suit}-${rank}`;
            
            // 重複チェック（現在選択中のスロットが持っているカード自体は、選択肢から除外しない）
            const isUsedByOthers = Object.entries(usedCards).some(([id, key]) => id !== activeId && key === cardKey);
            
            if(isUsedByOthers) {
                btn.classList.add('disabled');
            }
            
            btn.innerText = rank;
            btn.onclick = () => setCard(rank, cardKey);
            grid.appendChild(btn);
        });
    }

    function setCard(rank, key) {
        const el = document.getElementById(activeId);
        el.className = `card selected ${selSuit}`;
        el.innerHTML = `<div style="font-size:1.1rem">${rank}</div><div style="font-size:1.3rem">${selChar}</div>`;
        
        // データの更新
        usedCards[activeId] = key;
        document.getElementById('card-picker').style.display = 'none';
        
        console.log("Current Used Cards:", usedCards);
    }

    function resetAll() {
        if(!confirm("全てのカード設定をリセットしますか？")) return;
        usedCards = {};
        document.querySelectorAll('.card').forEach(c => {
            c.className = 'card';
            c.innerHTML = '?';
        });
    }
</script>

</body>
</html>
