<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BJ Counter Pro - GTO Edition</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --panel: #1a1a1a;
            --accent: #d4af37;
            --spades: #4d94ff;   /* 青 */
            --clubs: #5cd65c;    /* 緑 */
            --hearts: #ff4d4d;   /* 赤 */
            --diamonds: #ffcc00; /* 黄 */
        }

        body {
            margin: 0; padding: 0; background: var(--bg); color: #fff;
            font-family: -apple-system, sans-serif; overflow: hidden;
            height: 100vh; display: flex; flex-direction: column;
        }

        /* ヘッダーエリア：勝率・GTO表示 */
        .header {
            height: 50px; background: #000; display: flex; align-items: center;
            padding: 0 10px; border-bottom: 1px solid #333; justify-content: space-between;
        }
        .stats { font-size: 0.8rem; font-weight: bold; color: var(--accent); }
        .gto-btn { background: var(--accent); color: #000; border: none; padding: 5px 15px; border-radius: 4px; font-weight: bold; }

        /* メインテーブルエリア */
        .main-view { flex-grow: 1; position: relative; overflow: hidden; background: radial-gradient(circle, #222 0%, #000 100%); }
        .poker-table {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 55%; border: 6px solid #333; border-radius: 120px;
            background: #151515; box-shadow: inset 0 0 40px #000;
        }

        /* プレイヤー配置 */
        .player { position: absolute; width: 60px; text-align: center; font-size: 0.6rem; }
        .player-box { background: rgba(0,0,0,0.7); border: 1px solid #444; border-radius: 4px; padding: 2px; }
        .stack-input { width: 100%; background: transparent; border: none; color: #fff; text-align: center; border-bottom: 1px solid #555; font-size: 0.7rem; }
        
        .p1 { top: -20px; left: 50%; transform: translateX(-50%); } /* UTG */
        .p2 { top: 10%; right: 5%; } .p3 { top: 50%; right: -30px; } /* BTN */
        .hero { bottom: -30px; left: 50%; transform: translateX(-50%); } /* HERO */

        /* カードスロット */
        .slot {
            width: 35px; height: 50px; background: #222; border: 1px dashed #555;
            border-radius: 4px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; font-weight: bold; cursor: pointer; font-size: 0.8rem;
        }
        .slot.active { border: 2px solid var(--accent); box-shadow: 0 0 10px var(--accent); }
        
        /* カードカラー定義 */
        .c-spades { color: var(--spades) !important; background: #fff !important; border: 1px solid #ccc; }
        .c-clubs { color: var(--clubs) !important; background: #fff !important; border: 1px solid #ccc; }
        .c-hearts { color: var(--hearts) !important; background: #fff !important; border: 1px solid #ccc; }
        .c-diamonds { color: var(--diamonds) !important; background: #fff !important; border: 1px solid #ccc; }

        /* 下部ピッカーエリア */
        .picker-area {
            height: 160px; background: #111; border-top: 2px solid #333;
            padding: 5px; display: flex; flex-direction: column; gap: 4px;
        }
        .suit-row { display: grid; grid-template-columns: repeat(13, 1fr); gap: 2px; flex: 1; }
        .p-btn {
            background: #eee; border-radius: 2px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; border: none;
        }
        .p-btn.disabled { background: #222 !important; color: #444 !important; pointer-events: none; }
        .row-s { color: var(--spades); } .row-c { color: var(--clubs); }
        .row-h { color: var(--hearts); } .row-d { color: var(--diamonds); }
    </style>
</head>
<body>

<div class="header">
    <div class="stats">EQUITY: <span id="equity-val">--%</span></div>
    <div style="display:flex; gap:10px;">
        <button class="gto-btn" onclick="alert('GTO Strategy: Check/Call')">GTO</button>
        <button onclick="resetAll()" style="background:#444; border:none; color:#fff; font-size:0.7rem; padding:0 10px; border-radius:4px;">RESET</button>
    </div>
</div>

<div class="main-view">
    <div class="poker-table">
        <!-- Board -->
        <div style="position:absolute; top:35%; left:50%; transform:translate(-50%, -50%); display:flex; gap:5px;">
            <div class="slot" id="b1" onclick="setActive('b1')">?</div>
            <div class="slot" id="b2" onclick="setActive('b2')">?</div>
            <div class="slot" id="b3" onclick="setActive('b3')">?</div>
            <div class="slot" id="b4" onclick="setActive('b4')">?</div>
            <div class="slot" id="b5" onclick="setActive('b5')">?</div>
        </div>

        <!-- Players (サンプル3名) -->
        <div class="player p1"><div class="player-box">UTG<input class="stack-input" value="100BB"></div></div>
        <div class="player p2"><div class="player-box">BTN<input class="stack-input" value="150BB"></div></div>

        <!-- Hero -->
        <div class="player hero">
            <div style="display:flex; gap:5px; margin-bottom:5px;">
                <div class="slot" id="h1" onclick="setActive('h1')">?</div>
                <div class="slot" id="h2" onclick="setActive('h2')">?</div>
            </div>
            <div class="player-box" style="border-color:var(--accent)">
                HERO<input class="stack-input" value="200BB">
            </div>
        </div>
    </div>
</div>

<!-- 52枚固定ピッカー -->
<div class="picker-area" id="picker">
    <!-- JSで生成 -->
</div>

<script>
    let activeSlot = 'h1';
    let usedCards = {}; 
    const suits = [
        {id:'spades', char:'♠', class:'row-s'},
        {id:'clubs', char:'♣', class:'row-c'},
        {id:'hearts', char:'♥', class:'row-h'},
        {id:'diamonds', char:'♦', class:'row-d'}
    ];
    const ranks = ['A','K','Q','J','10','9','8','7','6','5','4','3','2'];

    function setActive(id) {
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        activeSlot = id;
        document.getElementById(id).classList.add('active');
        renderPicker();
    }

    function renderPicker() {
        const picker = document.getElementById('picker');
        picker.innerHTML = '';
        suits.forEach(suit => {
            const row = document.createElement('div');
            row.className = `suit-row ${suit.class}`;
            ranks.forEach(rank => {
                const key = `${suit.id}-${rank}`;
                const btn = document.createElement('button');
                btn.className = 'p-btn';
                const isUsed = Object.entries(usedCards).some(([sid, k]) => sid !== activeSlot && k === key);
                if(isUsed) btn.classList.add('disabled');
                btn.innerHTML = `<div>${rank}</div><div>${suit.char}</div>`;
                btn.onclick = () => selectCard(suit, rank, key);
                row.appendChild(btn);
            });
            picker.appendChild(row);
        });
    }

    function selectCard(suit, rank, key) {
        const slot = document.getElementById(activeSlot);
        slot.className = `slot selected c-${suit.id}`;
        slot.innerHTML = `<div>${rank}</div><div>${suit.char}</div>`;
        usedCards[activeSlot] = key;
        
        // 次の枠へ自動移動
        const order = ['h1','h2','b1','b2','b3','b4','b5'];
        let idx = order.indexOf(activeSlot);
        if(idx < order.length - 1) setActive(order[idx+1]);
        else renderPicker();

        // 簡易勝率計算（シミュレーション用）
        updateEquity();
    }

    function updateEquity() {
        if(usedCards['h1'] && usedCards['h2']) {
            document.getElementById('equity-val').innerText = (Math.random() * 40 + 30).toFixed(1) + "%";
        }
    }

    function resetAll() {
        usedCards = {};
        document.querySelectorAll('.slot').forEach(s => {
            s.className = 'slot';
            s.innerHTML = '?';
        });
        document.getElementById('equity-val').innerText = "--%";
        setActive('h1');
    }

    // 初回起動
    setActive('h1');
</script>

</body>
</html>
