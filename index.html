<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poker Strategy - Rotated UI</title>
    <style>
        :root {
            --bg-dark: #050505;
            --table-gray: #1a1a1a;
            --accent-gold: #d4af37;
            --color-spades: #4d94ff;
            --color-hearts: #ff4d4d;
            --color-clubs: #5cd65c;
            --color-diamonds: #ffcc00;
        }

        /* 画面全体を黒に */
        html, body {
            margin: 0; padding: 0; background: #000;
            width: 100%; height: 100%; overflow: hidden;
        }

        /* 
           ここが核心：アプリ全体を90度回転させる
           縦持ち状態で「横向きの画面」に見えるように配置
        */
        .rotated-wrapper {
            position: absolute;
            top: 50%; left: 50%;
            width: 100vh; /* 縦の長さを「回転後の幅」にする */
            height: 100vw; /* 横の幅を「回転後の高さ」にする */
            transform: translate(-50%, -50%) rotate(90deg);
            background: var(--bg-dark);
            display: flex; flex-direction: column;
            transform-origin: center center;
        }

        /* ヘッダー */
        .top-nav {
            height: 40px; background: #111; display: flex; align-items: center;
            padding: 0 15px; border-bottom: 1px solid #222; justify-content: space-between;
        }

        /* テーブルエリア */
        .table-area {
            flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #151515 0%, #050505 100%);
        }
        .poker-table {
            width: 85%; height: 65%; background: var(--table-gray);
            border: 8px solid #333; border-radius: 150px;
            position: relative; box-shadow: inset 0 0 50px #000;
        }

        /* カード */
        .card {
            width: 42px; height: 60px; background: #fff; border-radius: 4px;
            color: #000; display: flex; flex-direction: column; align-items: center;
            justify-content: center; font-weight: bold; cursor: pointer; border: 1px solid #ccc;
            font-size: 0.9rem;
        }
        .card.facedown { background: #333; color: #555; border: 1px solid #444; }
        .spades { color: var(--color-spades); }
        .hearts { color: var(--color-hearts); }
        .clubs { color: var(--color-clubs); }
        .diamonds { color: var(--color-diamonds); }

        /* プレイヤー配置 */
        .player { position: absolute; width: 90px; text-align: center; }
        .player-box { background: rgba(0,0,0,0.8); border: 1px solid #444; border-radius: 8px; padding: 4px; }
        .stack-input { background: transparent; border: none; color: #fff; width: 45px; text-align: center; border-bottom: 1px solid #444; font-size: 0.8rem; }
        
        .p-utg { top: -35px; left: 15%; }
        .p-btn { top: 40%; right: -70px; }
        .hero { bottom: -55px; left: 50%; transform: translateX(-50%); }

        /* モーダル（回転したラッパーの中に配置） */
        .modal {
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #222; padding: 15px; border-radius: 12px; border: 1px solid var(--accent-gold);
            width: 80%; text-align: center;
        }

        /* カードピッカー用グリッド */
        .picker-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 10px; }
        .suit-btn { font-size: 24px; padding: 8px; cursor: pointer; border: 1px solid #444; background: #333; border-radius: 5px; }
        .rank-btn { padding: 8px 0; background: #fff; color: #000; border-radius: 3px; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="rotated-wrapper">
    <nav class="top-nav">
        <div id="game-info" style="font-size: 0.75rem; color: var(--accent-gold);">Rate: $1/2 | Ante: 0.2</div>
        <button onclick="openModal('settings-modal')" style="background: #333; color: white; border: none; padding: 4px 12px; border-radius: 4px; font-size: 0.8rem;">設定</button>
    </nav>

    <div class="table-area">
        <div class="poker-table">
            <!-- ボード -->
            <div style="position:absolute; top:45%; left:50%; transform:translate(-50%, -50%); display:flex; gap:6px;">
                <div class="card facedown" id="board1" onclick="openCardPicker('board1')">?</div>
                <div class="card facedown" id="board2" onclick="openCardPicker('board2')">?</div>
                <div class="card facedown" id="board3" onclick="openCardPicker('board3')">?</div>
                <div class="card facedown" id="board4" onclick="openCardPicker('board4')">?</div>
                <div class="card facedown" id="board5" onclick="openCardPicker('board5')">?</div>
            </div>

            <!-- プレイヤー -->
            <div class="player p-utg">
                <div class="player-box">
                    <div style="font-size:0.6rem; color:var(--accent-gold)">UTG</div>
                    $<input type="number" class="stack-input" value="200">
                </div>
            </div>

            <!-- ヒーロー -->
            <div class="player hero">
                <div style="display:flex; gap:4px; justify-content:center; margin-bottom:5px;">
                    <div class="card facedown" id="hero1" onclick="openCardPicker('hero1')">?</div>
                    <div class="card facedown" id="hero2" onclick="openCardPicker('hero2')">?</div>
                </div>
                <div class="player-box" style="border-color: var(--accent-gold);">
                    <div style="font-size:0.6rem; color:#fff">HERO (BB)</div>
                    $<input type="number" class="stack-input" value="300">
                </div>
            </div>
        </div>
    </div>

    <!-- 設定モーダル -->
    <div id="settings-modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>Settings</h3>
            <div style="font-size:0.8rem; text-align: left; display:inline-block;">
                <p>SB: <input type="number" id="sb-val" value="1" style="width:50px;"></p>
                <p>BB: <input type="number" id="bb-val" value="2" style="width:50px;"></p>
            </div>
            <button class="rank-btn" onclick="saveSettings()" style="width:100%; margin-top:10px; background:var(--accent-gold);">保存して閉じる</button>
        </div>
    </div>

    <!-- カードピッカー -->
    <div id="card-picker" class="modal">
        <div class="modal-content">
            <div id="suit-selection" style="display:flex; justify-content:space-around;">
                <div class="suit-btn" style="color:var(--color-spades)" onclick="selectSuit('spades', '♠')">♠</div>
                <div class="suit-btn" style="color:var(--color-hearts)" onclick="selectSuit('hearts', '♥')">♥</div>
                <div class="suit-btn" style="color:var(--color-clubs)" onclick="selectSuit('clubs', '♣')">♣</div>
                <div class="suit-btn" style="color:var(--color-diamonds)" onclick="selectSuit('diamonds', '♦')">♦</div>
            </div>
            <div id="rank-selection" class="picker-grid" style="display:none;"></div>
            <button onclick="document.getElementById('card-picker').style.display='none'" style="margin-top:10px; width:100%; border:none; padding:8px;">キャンセル</button>
        </div>
    </div>
</div>

<script>
    let activeCardId = null;
    let selectedSuit = '';
    let selectedSuitChar = '';

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(e) { e.target.style.display = 'none'; }

    function openCardPicker(id) {
        activeCardId = id;
        document.getElementById('suit-selection').style.display = 'flex';
        document.getElementById('rank-selection').style.display = 'none';
        document.getElementById('card-picker').style.display = 'flex';
    }

    function selectSuit(suit, char) {
        selectedSuit = suit;
        selectedSuitChar = char;
        document.getElementById('suit-selection').style.display = 'none';
        const rankGrid = document.getElementById('rank-selection');
        rankGrid.style.display = 'grid';
        rankGrid.innerHTML = '';
        ['A','K','Q','J','10','9','8','7','6','5','4','3','2'].forEach(rank => {
            const btn = document.createElement('div');
            btn.className = 'rank-btn';
            btn.innerText = rank;
            btn.onclick = () => setCard(rank);
            rankGrid.appendChild(btn);
        });
    }

    function setCard(rank) {
        const cardEl = document.getElementById(activeCardId);
        cardEl.className = `card ${selectedSuit}`;
        cardEl.innerHTML = `<div>${rank}</div><div>${selectedSuitChar}</div>`;
        document.getElementById('card-picker').style.display = 'none';
    }

    function saveSettings() {
        const sb = document.getElementById('sb-val').value;
        const bb = document.getElementById('bb-val').value;
        document.getElementById('game-info').innerText = `Rate: $${sb}/${bb}`;
        document.getElementById('settings-modal').style.display = 'none';
    }
</script>

</body>
</html>
