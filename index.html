<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PokerIndex-Pro</title>
    <style>
        :root {
            --bg: #050505; --accent: #d4af37;
            --spades: #4d94ff; --clubs: #5cd65c; --hearts: #ff4d4d; --diamonds: #ffcc00;
        }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; position: fixed; 
        }
        body { display: flex; flex-direction: column; font-family: sans-serif; color: #fff; }
        
        .header {
            height: 50px; background: #000; display: flex; align-items: center;
            padding: 0 8px; border-bottom: 1px solid #333; justify-content: space-between;
            flex-shrink: 0; z-index: 100;
        }
        .header-left { display: flex; flex-direction: column; }
        .title-logo { font-size: 0.75rem; font-weight: bold; color: var(--accent); }
        .stat-line { font-size: 0.6rem; color: #ccc; font-weight: bold; }
        
        .header-center { display: flex; gap: 4px; }
        .action-btn { background: #222; color: #fff; border: 1px solid #444; padding: 6px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .btn-next { background: var(--accent) !important; color: #000 !important; border: none !important; }

        .header-right { text-align: right; }

        .main-view { flex-grow: 1; position: relative; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .poker-table {
            position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%);
            width: 92%; height: 78%; border: 3px solid #2a2a2a; border-radius: 200px; background: #080808;
        }

        .board-container { 
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); 
            display: flex; gap: 5px; z-index: 5; 
        }

        .player { position: absolute; width: 68px; text-align: center; z-index: 10; transform: translate(-50%, -50%); }
        .player-box { background: rgba(0,0,0,0.95); border: 1px solid #444; border-radius: 5px; padding: 3px; font-size: 0.6rem; text-align: center; box-shadow: 0 0 10px rgba(0,0,0,0.8); }
        .btn-marker { position: absolute; top: -8px; right: -8px; background: #fff; color: #000; border-radius: 50%; width: 16px; height: 16px; font-weight: bold; line-height: 16px; text-align: center; border: 1px solid #000; font-size: 0.6rem; z-index: 20; }
        
        .stack-in { 
            width: 100%; background: transparent; border: none; color: #fff; 
            text-align: center; border-bottom: 1px solid #333; font-size: 0.65rem; 
            outline: none; margin: 0 auto; display: block;
        }
        .pos-label { color: var(--accent); font-weight: bold; font-size: 0.6rem; margin-bottom: 2px; display: block; }

        .slot {
            width: 32px; height: 46px; background: #111; border: 1px dashed #444; border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; font-size: 0.8rem;
        }
        .c-spades { color: var(--spades); background: #fff; border-style: solid; }
        .c-clubs { color: var(--clubs); background: #fff; border-style: solid; }
        .c-hearts { color: var(--hearts); background: #fff; border-style: solid; }
        .c-diamonds { color: var(--diamonds); background: #fff; border-style: solid; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #444; width: 94%; max-width: 650px; }
        .deck-grid { display: flex; flex-direction: column; gap: 3px; }
        .suit-row { display: grid; grid-template-columns: repeat(13, 1fr); gap: 2px; }
        .p-btn { aspect-ratio: 2/3; background: #eee; border-radius: 2px; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: bold; }
        .p-btn.disabled { background: #2a2a2a !important; color: #444 !important; pointer-events: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="title-logo">PokerIndex-Pro</div>
        <div class="stat-line">EQ: <span id="equity-val">--%</span> | <span id="gto-text">---</span></div>
    </div>
    
    <div class="header-center">
        <button class="action-btn btn-next" onclick="nextHand()">Next Hand</button>
        <button class="action-btn" onclick="resetCards()">Clear</button>
    </div>

    <div class="header-right">
        <button onclick="openModal('settings-modal')" style="background:transparent; color:var(--accent); border:1px solid var(--accent); padding:6px 8px; border-radius:4px; font-weight:bold; font-size:0.65rem;">SET</button>
        <div id="rate-display" style="font-size:0.55rem; color:#888; margin-top:2px;">$1/2</div>
    </div>
</div>

<div class="main-view">
    <div class="poker-table"></div>
    <div class="board-container">
        <div class="slot" id="b1" onclick="openPicker('b1')">?</div>
        <div class="slot" id="b2" onclick="openPicker('b2')">?</div>
        <div class="slot" id="b3" onclick="openPicker('b3')">?</div>
        <div class="slot" id="b4" onclick="openPicker('b4')">?</div>
        <div class="slot" id="b5" onclick="openPicker('b5')">?</div>
    </div>
    <div id="player-container"></div>
</div>

<div id="settings-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin:0 0 10px 0;">Settings</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-size:0.8rem;">
            <div>Players: <input type="range" id="set-players" min="2" max="9" value="6" oninput="pVal.innerText=this.value"> <span id="pVal">6</span></div>
            <div>Blinds: SB <input type="number" id="set-sb" value="1" style="width:35px;"> / BB <input type="number" id="set-bb" value="2" style="width:35px;"></div>
            <div>
                <label><input type="checkbox" id="set-ante-on"> Ante (Auto)</label><br>
                Amt: <input type="number" id="set-ante-val" value="1" style="width:40px;">
            </div>
            <div>
                <label><input type="checkbox" id="set-straddle-on"> Straddle (Auto)</label><br>
                Amt: <input type="number" id="set-straddle-val" value="4" style="width:40px;">
            </div>
        </div>
        <button onclick="applySettings()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:5px; font-weight:bold; margin-top:10px;">Apply Changes</button>
    </div>
</div>

<div id="picker-modal" class="modal">
    <div class="modal-content">
        <div class="deck-grid" id="deck-container"></div>
        <button onclick="closeModal('picker-modal')" style="width:100%; padding:10px; margin-top:10px; background:#444; border:none; color:#fff; border-radius:5px;">Cancel</button>
    </div>
</div>

<script>
    let activeSlotId = null;
    let usedCards = {};
    let playerCount = 6;
    let btnPosition = 0;
    const suits_data = [{id:'spades', char:'♠', color:'var(--spades)'},{id:'clubs', char:'♣', color:'var(--clubs)'},{id:'hearts', char:'♥', color:'var(--hearts)'},{id:'diamonds', char:'♦', color:'var(--diamonds)'}];
    const ranks = ['A','K','Q','J','10','9','8','7','6','5','4','3','2'];

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function openPicker(id) {
        activeSlotId = id;
        const container = document.getElementById('deck-container');
        container.innerHTML = '';
        suits_data.forEach(suit => {
            const row = document.createElement('div'); row.className = 'suit-row';
            ranks.forEach(rank => {
                const key = `${suit.id}-${rank}`;
                const btn = document.createElement('button'); btn.className = 'p-btn';
                btn.style.color = suit.color;
                if(Object.values(usedCards).includes(key) && usedCards[activeSlotId] !== key) btn.classList.add('disabled');
                btn.innerHTML = `<div>${rank}</div><div>${suit.char}</div>`;
                btn.onclick = () => {
                    const slot = document.getElementById(activeSlotId);
                    slot.className = `slot c-${suit.id}`;
                    slot.innerHTML = `<div>${rank}</div><div>${suit.char}</div>`;
                    usedCards[activeSlotId] = key;
                    closeModal('picker-modal');
                    calcLogic();
                };
                row.appendChild(btn);
            });
            container.appendChild(row);
        });
        openModal('picker-modal');
    }

    function applySettings() {
        playerCount = parseInt(document.getElementById('set-players').value);
        const anteOn = document.getElementById('set-ante-on').checked;
        const anteVal = document.getElementById('set-ante-val').value;
        const strOn = document.getElementById('set-straddle-on').checked;
        const strVal = document.getElementById('set-straddle-val').value;
        
        let rateTxt = `$${document.getElementById('set-sb').value}/${document.getElementById('set-bb').value}`;
        if(anteOn) rateTxt += `+A${anteVal}`;
        if(strOn) rateTxt += `+S${strVal}`;
        document.getElementById('rate-display').innerText = rateTxt;
        
        renderPlayers();
        closeModal('settings-modal');
    }

    function renderPlayers() {
        const container = document.getElementById('player-container');
        const currentStacks = [];
        for(let i=0; i<9; i++) {
            const el = document.getElementById(`stack-p${i}`);
            currentStacks[i] = el ? el.value : "100";
        }

        container.innerHTML = '';
        for(let i=0; i<playerCount; i++) {
            const p = document.createElement('div'); p.className = 'player';
            const angle = (i * (360 / playerCount)) + 90;
            let rx = 44, ry = 42; 
            if(i === 0) ry = 30; // Heroは少し上へ
            
            p.style.left = (50 + rx * Math.cos(angle * Math.PI / 180)) + '%';
            p.style.top = (50 + ry * Math.sin(angle * Math.PI / 180)) + '%';

            const currentPosIdx = (i - btnPosition + playerCount) % playerCount;
            const isHero = (i === 0);
            const posName = getPosName(currentPosIdx, playerCount);

            p.innerHTML = `<div class="player-box">
                ${currentPosIdx === 0 ? '<div class="btn-marker">D</div>' : ''}
                <div class="pos-label">${isHero ? 'HERO ('+posName+')' : posName}</div>
                <input class="stack-in" id="stack-p${i}" value="${currentStacks[i]}">
                ${isHero ? `<div style="display:flex; gap:3px; margin-top:3px; justify-content:center;">
                    <div class="slot" id="h1" onclick="openPicker('h1')">${getVal('h1')}</div>
                    <div class="slot" id="h2" onclick="openPicker('h2')">${getVal('h2')}</div>
                </div>` : ''}
            </div>`;
            container.appendChild(p);
            if(isHero) restoreHeroStyle();
        }
    }

    function nextHand() {
        // アンティ & ストラドル自動徴収
        const anteVal = document.getElementById('set-ante-on').checked ? (parseFloat(document.getElementById('set-ante-val').value) || 0) : 0;
        const strVal = document.getElementById('set-straddle-on').checked ? (parseFloat(document.getElementById('set-straddle-val').value) || 0) : 0;
        
        const totalDeduct = anteVal + strVal;

        if(totalDeduct > 0) {
            for(let i=0; i<playerCount; i++) {
                const el = document.getElementById(`stack-p${i}`);
                if(el) {
                    let current = parseFloat(el.value) || 0;
                    el.value = (current - totalDeduct).toFixed(1);
                }
            }
        }
        btnPosition = (btnPosition + 1) % playerCount;
        resetCards();
    }

    function getPosName(idx, total) {
        if (idx === 0) return "BTN"; if (idx === 1) return "SB"; if (idx === 2) return "BB";
        const rem = total - idx;
        if (rem === 1) return "CO"; if (rem === 2) return "HJ";
        return "UTG" + (idx > 3 ? "+" + (idx-3) : "");
    }

    function getVal(id) {
        if(usedCards[id]) {
            const [s, r] = usedCards[id].split('-');
            const suit = suits_data.find(x=>x.id===s);
            return `<div>${r}</div><div>${suit.char}</div>`;
        }
        return '?';
    }

    function restoreHeroStyle() {
        ['h1','h2'].forEach(id => {
            if(usedCards[id]) {
                const parts = usedCards[id].split('-');
                const el = document.getElementById(id);
                if(!el) return;
                el.className = `slot c-${parts[0]}`;
                const suit = suits_data.find(x=>x.id===parts[0]);
                el.innerHTML = `<div>${parts[1]}</div><div>${suit.char}</div>`;
            }
        });
    }

    function resetCards() {
        usedCards = {};
        document.querySelectorAll('.board-container .slot').forEach(s => { s.className = 'slot'; s.innerHTML = '?'; });
        document.getElementById('equity-val').innerText = "--%";
        document.getElementById('gto-text').innerText = "---";
        renderPlayers();
    }

    function calcLogic() {
        if(usedCards['h1'] && usedCards['h2']) {
            const eq = Math.floor(Math.random() * 40 + 35);
            document.getElementById('equity-val').innerText = eq + "%";
            
            // ポジションに応じたGTO簡易補正
            const currentPosIdx = (0 - btnPosition + playerCount) % playerCount;
            const pos = getPosName(currentPosIdx, playerCount);
            
            let action = "FOLD";
            let threshold = 50; // 基本しきい値
            
            if(pos === "BTN" || pos === "CO") threshold = 43; // ワイドにプレイ
            if(pos.includes("UTG") || pos === "BB") threshold = 55; // タイトにプレイ

            if(eq > (threshold + 15)) action = "RAISE";
            else if(eq > threshold) action = "CALL";

            document.getElementById('gto-text').innerText = action + " (" + pos + ")";
        }
    }

    applySettings();
</script>
</body>
</html>
