<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PokerIndex-Pro</title>
    <style>
        :root {
            --bg: #050505; --accent: #d4af37;
            --spades: #4d94ff; --clubs: #5cd65c; --hearts: #ff4d4d; --diamonds: #ffcc00;
            --color-blue: #000080; --color-red: #ff4d4d; --color-yellow: #ffcc00;
            --color-green: #5cd65c; --color-cyan: #3182ce; --color-white: #ffffff;
        }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background: #000; position: fixed; font-family: sans-serif; color: #fff;
            touch-action: none;
        }
        
        .header { height: 75px; background: #000; display: flex; align-items: center; padding: 0 8px; border-bottom: 1px solid #333; justify-content: space-between; z-index: 1000; }
        .header-left { display: flex; flex-direction: column; min-width: 180px; }
        .title-logo { font-size: 0.7rem; font-weight: bold; color: var(--accent); }
        .stat-line { font-size: 0.6rem; color: #ccc; font-weight: bold; line-height: 1.4; }
        .stat-label { color: var(--accent); margin-right: 2px; }
        .start-val { color: #4d94ff; font-weight: 900; }
        
        .action-btn { background: #222; color: #fff; border: 1px solid #444; padding: 6px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .btn-next { background: var(--accent) !important; color: #000 !important; border: none !important; }

        .main-view { flex-grow: 1; position: relative; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); height: calc(100vh - 75px); }
        .poker-table { position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%); width: 92%; height: 75%; border: 3px solid #2a2a2a; border-radius: 200px; background: #080808; }
        
        /* ボード周辺のデザイン修正 */
        .board-wrapper { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 50; width: 100%; }
        .board-container { display: flex; gap: 5px; }
        
        /* 役表示エリア */
        .hand-analysis { background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 4px; font-size: 0.65rem; text-align: center; border: 1px solid #333; min-width: 150px; }
        .current-hand-name { color: var(--accent); font-weight: bold; margin-bottom: 2px; }
        .draw-info { color: #aaa; font-size: 0.55rem; }

        .player { position: absolute; width: 72px; text-align: center; z-index: 100; transform: translate(-50%, -50%); }
        .player-box { background: rgba(0,0,0,0.95); border: 1px solid #444; border-radius: 5px; padding: 5px; font-size: 0.6rem; box-shadow: 0 0 10px rgba(0,0,0,0.8); }
        .player.hero { z-index: 200; }
        .player.folded { opacity: 0.3; }
        
        .btn-marker { position: absolute; top: -8px; right: -8px; background: #fff; color: #000; border-radius: 50%; width: 16px; height: 16px; font-weight: bold; line-height: 16px; text-align: center; font-size: 0.6rem; border: 1px solid #000; }
        .pos-label { color: var(--accent); font-weight: bold; font-size: 0.7rem; margin-bottom: 2px; display: block; }

        .slot { width: 30px; height: 42px; background: #111; border: 1px dashed #444; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 0.75rem; cursor: pointer; color: #888; }
        .c-spades { color: var(--spades) !important; background: #fff; border: 1px solid #fff; }
        .c-clubs { color: var(--clubs) !important; background: #fff; border: 1px solid #fff; }
        .c-hearts { color: var(--hearts) !important; background: #fff; border: 1px solid #fff; }
        .c-diamonds { color: var(--diamonds) !important; background: #fff; border: 1px solid #fff; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #1a1a1a; padding: 10px 5px; border-radius: 10px; border: 1px solid #444; width: 98%; max-width: 650px; }
        .suit-row { display: grid; grid-template-columns: repeat(13, 1fr); gap: 1px; margin-bottom: 4px; width: 100%; }
        .p-btn { aspect-ratio: 2/3; background: #eee; border-radius: 2px; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: bold; padding: 2px 0; }
        .p-btn.disabled { background: #2a2a2a !important; color: #444 !important; pointer-events: none; }
        
        .fold-btn { width: 100%; margin-top: 5px; font-size: 0.55rem; padding: 4px; border-radius: 3px; border: 1px solid #555; background: #333; color: #fff; font-weight: bold; }
        .fold-btn.active { background: #822; border-color: #f55; color: #fff; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="title-logo">PokerIndex-Pro</div>
        <div class="stat-line">
            <div><span class="stat-label">START-EQ:</span><span id="start-eq" class="start-val">--%</span></div>
            <div><span class="stat-label">GTO:</span><span id="gto-text">---</span> | <span class="stat-label">RANGE:</span><span id="yokosawa-text">---</span></div>
            <div><span class="stat-label">ACTIVE:</span><span id="active-count">0</span></div>
        </div>
    </div>
    <div class="header-center">
        <button class="action-btn btn-next" onclick="nextHand()">Next Hand</button>
    </div>
    <div class="header-right">
        <button onclick="openModal('settings-modal')" style="background:transparent; color:var(--accent); border:1px solid var(--accent); padding:6px 8px; border-radius:4px; font-weight:bold; font-size:0.65rem;">SET</button>
    </div>
</div>

<div class="main-view">
    <div class="poker-table"></div>
    <div class="board-wrapper">
        <div class="board-container" id="board">
            <div class="slot" id="b1" onclick="openPicker('b1')">?</div>
            <div class="slot" id="b2" onclick="openPicker('b2')">?</div>
            <div class="slot" id="b3" onclick="openPicker('b3')">?</div>
            <div class="slot" id="b4" onclick="openPicker('b4')">?</div>
            <div class="slot" id="b5" onclick="openPicker('b5')">?</div>
        </div>
        <!-- 役解析表示エリア -->
        <div id="analysis-box" class="hand-analysis" style="display:none;">
            <div id="current-hand-name" class="current-hand-name">High Card</div>
            <div id="draw-info" class="draw-info"></div>
        </div>
    </div>
    <div id="player-container"></div>
</div>

<div id="settings-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin:0 0 10px 0;">Table Settings</h3>
        <div style="display:grid; grid-template-columns: 1fr; gap:10px; font-size:0.8rem;">
            <div>Players: <input type="range" id="set-players" min="2" max="10" value="6" oninput="pVal.innerText=this.value"> <span id="pVal">6</span></div>
        </div>
        <button onclick="applySettings()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:5px; font-weight:bold; margin-top:10px;">Apply Changes</button>
    </div>
</div>

<div id="picker-modal" class="modal">
    <div class="modal-content">
        <div id="deck-container"></div>
        <button onclick="closeModal('picker-modal')" style="width:100%; padding:10px; margin-top:10px; background:#444; border:none; color:#fff; border-radius:5px;">Cancel</button>
    </div>
</div>

.4, 6.8], "72s": [38.1, 12.8, 8.5], "64o": [38.0, 12.0, 7.6], "43s": [38.0, 14.7, 10.3], "54o": [37.9, 12.6, 8.2], "83o": [37.5, 9.5, 5.1], "62s": [37.5, 13.3, 9.1], "52s": [37.5, 14.0, 9.8], "82o": [36.8, 9.1, 4.9], "73o": [36.6, 9.9, 5.7], "42s": [36.3, 13.7, 9.6], "63o": [35.9, 10.6, 6.5], "53o": [35.8, 11.4, 7.3], "32s": [35.1, 13.0, 9.2], "72o": [34.6, 8.6, 4.8], "43o": [34.4, 10.7, 6.8], "62o": [34.0, 9.1, 5.4], "52o": [33.9, 10.0, 6.2], "42o": [32.5, 9.5, 6.0], "32o": [31.2, 8.9, 5.6] };
    const suits_data = [{id:'spades', char:'♠', color:'var(--spades)'},{id:'clubs', char:'♣', color:'var(--clubs)'},{id:'hearts', char:'♥', color:'var(--hearts)'},{id:'diamonds', char:'♦', color:'var(--diamonds)'}];
    const ranks_list = ['A','K','Q','J','10','9','8','7','6','5','4','3','2'];
    
    const yokosawa_rules = {
        blue:   { color: "var(--color-blue)",   limit: 9, hands: ["AA", "AKs", "AKo", "KK", "QQ"] },
        red:    { color: "var(--color-red)",    limit: 9, hands: ["AQs", "AJs", "ATs", "KQs", "AQo", "JJ", "TT", "99"] },
        yellow: { color: "var(--color-yellow)", limit: 7, hands: ["KJs", "QJs", "JTs", "KQo", "AJo", "88", "77"] },
        green:  { color: "var(--color-green)",  limit: 5, hands: ["A9s", "A8s", "A7s", "A6s", "A5s", "A4s", "A3s", "A2s", "KTs", "K9s", "T9s", "QTs", "KJo", "ATo", "66", "55"] },
        cyan:   { color: "var(--color-cyan)",   limit: 3, hands: ["Q9s", "J9s", "T8s", "98s", "QJo", "KTo", "JTo", "A9o", "44", "33", "22"] },
        white:  { color: "var(--color-white)",  limit: 0, hands: ["K8s", "K7s", "K6s", "K5s", "K4s", "K3s", "K2s", "Q8s", "Q7s", "Q6s", "J8s", "J7s", "QTo", "K9o", "Q9o", "J9o", "T9o", "97s", "87s", "76s", "65s", "A8o", "A7o"] }
    };

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function openPicker(id) {
        const container = document.getElementById('deck-container');
        container.innerHTML = '';
        suits_data.forEach(suit => {
            const row = document.createElement('div'); row.className = 'suit-row';
            ranks_list.forEach(rank => {
                const key = `${suit.id}-${rank}`;
                const btn = document.createElement('button'); btn.className = 'p-btn';
                btn.style.color = suit.color;
                if(Object.values(usedCards).includes(key) && usedCards[id] !== key) btn.classList.add('disabled');
                btn.innerHTML = `<div>${rank}</div><div>${suit.char}</div>`;
                btn.onclick = () => {
                    const slot = document.getElementById(id);
                    slot.className = `slot c-${suit.id}`;
                    slot.innerHTML = `<div>${rank}</div><div>${suit.char}</div>`;
                    usedCards[id] = key;
                    closeModal('picker-modal');
                    calcLogic();
                };
                row.appendChild(btn);
            });
            container.appendChild(row);
        });
        openModal('picker-modal');
    }

    function applySettings() {
        playerCount = parseInt(document.getElementById('set-players').value);
        foldedPlayers = {};
        renderPlayers();
        closeModal('settings-modal');
    }

    function toggleFold(idx) {
        foldedPlayers[idx] = !foldedPlayers[idx];
        renderPlayers();
    }

    function renderPlayers() {
        const container = document.getElementById('player-container');
        container.innerHTML = '';
        for(let i=0; i<playerCount; i++) {
            const isFolded = !!foldedPlayers[i];
            const isHero = (i === 0);
            const p = document.createElement('div'); 
            p.className = 'player' + (isFolded ? ' folded' : '') + (isHero ? ' hero' : '');
            const angle = (i * (360 / playerCount)) + 90;
            let rx = 38, ry = (isHero) ? 22 : 38; 
            p.style.left = (50 + rx * Math.cos(angle * Math.PI / 180)) + '%';
            p.style.top = (50 + ry * Math.sin(angle * Math.PI / 180)) + '%';
            const currentPosIdx = (i - btnPosition + playerCount) % playerCount;
            const posName = getPosName(currentPosIdx, playerCount);
            p.innerHTML = `<div class="player-box">
                ${currentPosIdx === 0 ? '<div class="btn-marker">D</div>' : ''}
                <span class="pos-label">${isHero ? 'HERO ('+posName+')' : posName}</span>
                ${isHero ? `<div style="display:flex; gap:3px; margin-top:3px; justify-content:center;">
                    <div class="slot" id="h1" onclick="openPicker('h1')">${getVal('h1')}</div>
                    <div class="slot" id="h2" onclick="openPicker('h2')">${getVal('h2')}</div>
                </div>` : `<button class="fold-btn ${isFolded?'active':''}" onclick="toggleFold(${i})">${isFolded?'FOLDED':'ACTIVE'}</button>`}
            </div>`;
            container.appendChild(p);
            if(isHero) restoreHeroStyle();
        }
        calcLogic();
    }

    function getPosName(idx, total) {
        if (idx === 0) return "BTN"; if (idx === 1) return "SB"; if (idx === 2) return "BB";
        const rem = total - idx;
        if (rem === 1) return "CO"; if (rem === 2) return "HJ";
        return "UTG" + (idx > 3 ? "+" + (idx-3) : "");
    }

    function getVal(id) {
        if(usedCards[id]) {
            const [s, r] = usedCards[id].split('-');
            return `<div>${r}</div><div>${suits_data.find(x=>x.id===s).char}</div>`;
        }
        return '?';
    }

    function restoreHeroStyle() {
        ['h1','h2'].forEach(id => {
            if(usedCards[id]) {
                const parts = usedCards[id].split('-');
                const el = document.getElementById(id);
                if(el) { el.className = `slot c-${parts[0]}`; el.innerHTML = getVal(id); }
            }
        });
    }

    function nextHand() {
        btnPosition = (btnPosition + 1) % playerCount;
        usedCards = {}; foldedPlayers = {};
        document.querySelectorAll('#board .slot').forEach(s => { s.className='slot'; s.innerHTML='?'; });
        document.getElementById('analysis-box').style.display = 'none';
        renderPlayers();
    }

    function evaluateHandLogic(cards) {
        const rVals = cards.map(c => c.rankVal).sort((a, b) => b - a);
        const suits = cards.map(c => c.suit);
        const counts = {}; rVals.forEach(v => counts[v] = (counts[v] || 0) + 1);
        const freq = Object.entries(counts).map(([val, count]) => ({ val: parseInt(val), count })).sort((a, b) => b.count - a.count || b.val - a.val);
        const suitCounts = {}; suits.forEach(s => suitCounts[s] = (suitCounts[s] || 0) + 1);
        
        const flushSuit = Object.keys(suitCounts).find(s => suitCounts[s] >= 5);
        const isFlush = !!flushSuit;
        
        const uniqueRanks = [...new Set(rVals)].sort((a, b) => b - a);
        if (uniqueRanks.includes(14)) uniqueRanks.push(1);
        let isStraight = false;
        for (let i = 0; i <= uniqueRanks.length - 5; i++) {
            if (uniqueRanks[i] - uniqueRanks[i + 4] === 4) { isStraight = true; break; }
        }

        // アウツ計算（簡易版）
        let outs = 0;
        let drawName = "";
        
        // フラッシュドロー
        const flushDrawSuit = Object.keys(suitCounts).find(s => suitCounts[s] === 4);
        if (!isFlush && flushDrawSuit) { outs = 9; drawName = "Flush Draw"; }
        
        // ストレートドロー
        if (!isStraight) {
            for (let i = 0; i <= uniqueRanks.length - 4; i++) {
                const diff = uniqueRanks[i] - uniqueRanks[i+3];
                if (diff === 3) { outs = Math.max(outs, 8); if(outs===8) drawName = "OESD"; } // 両面
                else if (diff === 4) { outs = Math.max(outs, 4); if(outs===4 && drawName!=="OESD") drawName = "Gutshot"; } // 内側
            }
        }

        let rank = 0;
        if (isFlush && isStraight) rank = 8;
        else if (freq[0].count === 4) rank = 7;
        else if (freq[0].count === 3 && freq[1].count >= 2) rank = 6;
        else if (isFlush) rank = 5;
        else if (isStraight) rank = 4;
        else if (freq[0].count === 3) rank = 3;
        else if (freq[0].count === 2 && freq[1].count === 2) rank = 2;
        else if (freq[0].count === 2) rank = 1;
        
        return { rank, outs, drawName };
    }

    function calcLogic() {
        if(!usedCards['h1'] || !usedCards['h2']) return;
        const parse = (id) => {
            const [s, r] = usedCards[id].split('-');
            return { suit: s, rank: r, rankVal: 14 - ranks_list.indexOf(r) };
        };
        const h1 = parse('h1'), h2 = parse('h2');
        const board = [];
        for(let i=1; i<=5; i++) { if(usedCards['b'+i]) board.push(parse('b'+i)); }
        
        const char1 = (h1.rank === '10' ? 'T' : h1.rank), char2 = (h2.rank === '10' ? 'T' : h2.rank);
        const handStr = (h1.rankVal===h2.rankVal) ? char1+char1 : (h1.rankVal>h2.rankVal ? char1+char2 : char2+char1) + (h1.suit===h2.suit ? 's' : 'o');
        
        let activeCount = 0;
        for(let i=0; i<playerCount; i++) if(!foldedPlayers[i]) activeCount++;
        document.getElementById('active-count').innerText = activeCount;

        // ボード解析の表示
        if(board.length >= 3) {
            document.getElementById('analysis-box').style.display = 'block';
            const res = evaluateHandLogic([h1, h2, ...board]);
            document.getElementById('current-hand-name').innerText = handNames[res.rank];
            
            let drawTxt = "";
            if(board.length < 5 && res.outs > 0) {
                const prob = (board.length === 3) ? (res.outs * 4) : (res.outs * 2);
                drawTxt = `${res.drawName}: ${prob}%`;
            } else if (board.length < 5 && res.rank < 3) {
                drawTxt = "No Draw Found";
            }
            document.getElementById('draw-info').innerText = drawTxt;
        } else {
            document.getElementById('analysis-box').style.display = 'none';
        }

        let startEqVal = 0;
        if(start_win_rates[handStr]) {
            const [w2, w6, w10] = start_win_rates[handStr];
            if(activeCount <= 2) startEqVal = w2;
            else if(activeCount <= 6) startEqVal = w2 + (w6 - w2) * (activeCount - 2) / 4;
            else startEqVal = w6 + (w10 - w6) * (activeCount - 6) / 4;
        }
        document.getElementById('start-eq').innerText = startEqVal.toFixed(1) + "%";

        const heroPosIdx = (0 - btnPosition + playerCount) % playerCount;
        let countToBB = (heroPosIdx === 0) ? 3 : (heroPosIdx === 1) ? 2 : (heroPosIdx === 2) ? 1 : (playerCount - heroPosIdx) + 2; 
        let resultAction = "FOLD", resultColor = "#888";
        for (const key in yokosawa_rules) {
            if (yokosawa_rules[key].hands.includes(handStr)) {
                if (key === 'white') { if (heroPosIdx <= 2 || heroPosIdx === 0) { resultAction = "OPEN"; resultColor = yokosawa_rules[key].color; } }
                else if (countToBB <= yokosawa_rules[key].limit) { resultAction = "OPEN"; resultColor = yokosawa_rules[key].color; }
                break;
            }
        }
        document.getElementById('yokosawa-text').innerText = resultAction; 
        document.getElementById('yokosawa-text').style.color = resultColor;

        // GTO判断ロジック（簡易）
        let internalEq = startEqVal;
        if(board.length >= 3) {
            const res = evaluateHandLogic([h1, h2, ...board]);
            const basePower = [5, 25, 45, 70, 85, 92, 97, 99.8, 99.9][res.rank];
            let drawEquity = (board.length < 5) ? Math.min(res.outs * ((board.length === 3) ? 4 : 2), 40) : 0;
            let currentEquity = Math.max(basePower, drawEquity);
            internalEq = (res.rank >= 4) ? currentEquity : currentEquity * Math.pow(0.85, activeCount - 1);
        }
        const breakEven = (100 / activeCount); 
        const gtoText = document.getElementById('gto-text');
        if (internalEq > breakEven * 1.6) { gtoText.innerText = "RAISE"; gtoText.style.color = "var(--color-green)"; }
        else if (internalEq > breakEven * 0.85) { gtoText.innerText = "CALL"; gtoText.style.color = "var(--color-yellow)"; }
        else { gtoText.innerText = "FOLD"; gtoText.style.color = "var(--color-red)"; }
    }

    renderPlayers();
</script>
