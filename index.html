<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BJ Counter Pro - 52 Picker</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --table-gray: #1a1a1a;
            --accent-gold: #d4af37;
            --color-spades: #4d94ff;
            --color-hearts: #ff4d4d;
            --color-clubs: #5cd65c;
            --color-diamonds: #ffcc00;
        }

        html, body { margin: 0; padding: 0; background: #000; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }

        /* 90度回転レイアウト */
        .rotated-wrapper {
            position: absolute; top: 50%; left: 50%;
            width: 100vh; height: 100vw;
            transform: translate(-50%, -50%) rotate(90deg);
            background: var(--bg-dark); display: flex; flex-direction: column;
            transform-origin: center center;
        }

        .table-area { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; }

        .poker-table {
            width: 90%; height: 60%; background: var(--table-gray);
            border: 6px solid #333; border-radius: 150px; position: relative;
            box-shadow: inset 0 0 40px #000;
        }

        /* 盤面のカード枠 */
        .card-slot {
            width: 42px; height: 60px; background: #1a1a1a; border-radius: 5px;
            color: #444; display: flex; flex-direction: column; align-items: center;
            justify-content: center; font-weight: bold; cursor: pointer; border: 2px dashed #333;
            font-size: 0.9rem;
        }
        .card-slot.selected { background: #fff; color: #000; border: 1px solid #ccc; border-style: solid; }

        /* 52枚フルピッカー モーダル */
        .modal { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 10px; border-radius: 10px; border: 1px solid #333; width: 95%; max-width: 700px; }
        
        .deck-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .suit-row { display: grid; grid-template-columns: repeat(13, 1fr); gap: 3px; }
        
        /* ピッカー内の各カードボタン */
        .p-card {
            aspect-ratio: 2/3; background: #eee; color: #000; border-radius: 3px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: bold; cursor: pointer; border: none;
        }
        .p-card.disabled { background: #222 !important; color: #444 !important; pointer-events: none; opacity: 0.5; }
        
        /* スート別カラー(ピッカー用) */
        .row-spades .p-card { color: var(--color-spades); }
        .row-clubs .p-card { color: var(--color-clubs); }
        .row-hearts .p-card { color: var(--color-hearts); }
        .row-diamonds .p-card { color: var(--color-diamonds); }

        /* 盤面表示用 */
        .c-spades { color: var(--color-spades); }
        .c-clubs { color: var(--color-clubs); }
        .c-hearts { color: var(--color-hearts); }
        .c-diamonds { color: var(--color-diamonds); }
    </style>
</head>
<body>

<div class="rotated-wrapper">
    <nav style="height:40px; background:#000; display:flex; align-items:center; padding:0 15px; justify-content:space-between; border-bottom:1px solid #222;">
        <div style="color:var(--accent-gold); font-size:0.8rem; font-weight:bold;">BlackJoker21 Counter</div>
        <button onclick="resetAll()" style="background:#444; color:#fff; border:none; padding:4px 12px; border-radius:4px; font-size:0.7rem;">RESET</button>
    </nav>

    <div class="table-area">
        <div class="poker-table">
            <!-- Board: 5 Slots -->
            <div style="position:absolute; top:42%; left:50%; transform:translate(-50%, -50%); display:flex; gap:8px;">
                <div class="card-slot" id="b1" onclick="openPicker('b1')">?</div>
                <div class="card-slot" id="b2" onclick="openPicker('b2')">?</div>
                <div class="card-slot" id="b3" onclick="openPicker('b3')">?</div>
                <div class="card-slot" id="b4" onclick="openPicker('b4')">?</div>
                <div class="card-slot" id="b5" onclick="openPicker('b5')">?</div>
            </div>

            <!-- Hero Hand: 2 Slots -->
            <div style="position:absolute; bottom:-40px; left:50%; transform:translateX(-50%); display:flex; gap:10px;">
                <div class="card-slot" id="h1" onclick="openPicker('h1')" style="width:55px; height:78px; font-size:1.1rem;">?</div>
                <div class="card-slot" id="h2" onclick="openPicker('h2')" style="width:55px; height:78px; font-size:1.1rem;">?</div>
            </div>
        </div>
    </div>

    <!-- 52枚フルピッカー -->
    <div id="card-picker" class="modal">
        <div class="modal-content">
            <div class="deck-grid" id="deck-container">
                <!-- JSで52枚生成 -->
            </div>
            <button onclick="closePicker()" style="width:100%; padding:10px; background:#333; color:#fff; border:none; border-radius:5px; margin-top:5px;">閉じる</button>
        </div>
    </div>
</div>

<script>
    let activeSlotId = null;
    let usedCards = {}; // { b1: "spades-A", h1: "hearts-10" }

    const suits = [
        { name: 'spades', char: '♠', class: 'row-spades' },
        { name: 'clubs', char: '♣', class: 'row-clubs' },
        { name: 'hearts', char: '♥', class: 'row-hearts' },
        { name: 'diamonds', char: '♦', class: 'row-diamonds' }
    ];
    const ranks = ['A','K','Q','J','10','9','8','7','6','5','4','3','2'];

    function openPicker(id) {
        activeSlotId = id;
        renderDeck();
        document.getElementById('card-picker').style.display = 'flex';
    }

    function closePicker() {
        document.getElementById('card-picker').style.display = 'none';
    }

    function renderDeck() {
        const container = document.getElementById('deck-container');
        container.innerHTML = '';

        suits.forEach(suit => {
            const row = document.createElement('div');
            row.className = `suit-row ${suit.class}`;
            
            ranks.forEach(rank => {
                const cardKey = `${suit.name}-${rank}`;
                const btn = document.createElement('div');
                btn.className = 'p-card';
                
                // 他の枠で使われているかチェック（自分自身の枠は除く）
                const isUsed = Object.entries(usedCards).some(([sid, key]) => sid !== activeSlotId && key === cardKey);
                if (isUsed) btn.classList.add('disabled');

                btn.innerHTML = `<div>${rank}</div><div>${suit.char}</div>`;
                btn.onclick = () => selectCard(suit.name, suit.char, rank, cardKey);
                row.appendChild(btn);
            });
            container.appendChild(row);
        });
    }

    function selectCard(suitName, suitChar, rank, key) {
        const slot = document.getElementById(activeSlotId);
        slot.className = `card-slot selected c-${suitName}`;
        slot.innerHTML = `<div>${rank}</div><div>${suitChar}</div>`;
        
        usedCards[activeSlotId] = key;
        closePicker();
    }

    function resetAll() {
        if(!confirm("リセットしますか？")) return;
        usedCards = {};
        document.querySelectorAll('.card-slot').forEach(s => {
            s.className = 'card-slot';
            s.innerHTML = '?';
        });
    }
</script>

</body>
</html>
